name: bkash_clone

description: "A premium bKash Flutter Clone using Provider"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # SVG Support
  flutter_svg: ^2.0.10+1

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  iconsax: ^0.0.8

  # Network Image Cache
  cached_network_image: ^3.3.1

  # Splash Screen
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # App Icon Generator
  flutter_launcher_icons: ^0.14.1


flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/bkash.png
    - assets/bkash_logo.png


flutter_launcher_icons:

  android: true
  ios: true

  image_path: "assets/bkash.png"

  adaptive_icon_background: "#E2136E"
  adaptive_icon_foreground: "assets/bkash.png"

  min_sdk_android: 21

flutter_native_splash:

  color: "#E2136E"

  image: assets/bkash_logo.png

  android: true
  ios: true

  android_12:
    color: "#E2136E"
    image: assets/bkash_logo.png

  fullscreen: true