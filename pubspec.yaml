name: ai_chat
description: A modern AI chatbot app built with Flutter using Provider and Durjoy AI API.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # API Calls
  http: ^1.2.1

  # Date Formatting
  intl: ^0.19.0

  # Loading Animation
  flutter_spinkit: ^5.2.1

  # Optional Features
  shared_preferences: ^2.2.3
  flutter_markdown: ^0.7.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # App Icon Generator
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true

  assets:
    - assets/ai.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ai.png"
  min_sdk_android: 21

  adaptive_icon_background: "#14B8A6"
  adaptive_icon_foreground: "assets/ai.png"